# Editorial guidelines (all user-facing text in JSON/Markdown fields):
# - Do not use em dashes (—) or en dashes (–). Use commas, colons, or rephrase the sentence.
# - For ranges (times, nights, temperatures), write "bis" (e.g. "09:00 bis 21:00", "7 bis 14 Nächte", "38 bis 42 °C").

media:
  input: public/images
  output: /images

content:

  # ── HOMEPAGE ────────────────────────────────────────────────────────────────
  - name: homepage
    label: "Homepage"
    path: src/content/pages/homepage.json
    type: file
    fields:
      - name: seo_title
        label: "Page Title (Browser Tab)"
        type: string
      - name: seo_description
        label: "Page Description (Google)"
        type: text

      - name: hero
        label: "Hero Section"
        type: object
        fields:
          - name: image
            label: "Background Image"
            type: image
          - name: image_alt
            label: "Image Description (Alt Text)"
            type: string
          - name: caption
            label: "Location Label (e.g. \"Bad Wurzach · Allgäu\")"
            type: string
          - name: headline_line1
            label: "Headline Line 1"
            type: string
          - name: headline_line2
            label: "Headline Line 2 (italic, highlighted)"
            type: string
          - name: body
            label: "Intro Text"
            type: text
          - name: cta_primary_label
            label: "Primary Button Text"
            type: string
          - name: cta_primary_href
            label: "Primary Button Link"
            type: string
          - name: cta_secondary_label
            label: "Secondary Button Text"
            type: string
          - name: cta_secondary_href
            label: "Secondary Button Link"
            type: string

      - name: pillars
        label: "Three Pillars (01 Moorheilbad, 02 Therme, 03 Nature)"
        type: object
        fields:
          - name: moorheilbad
            label: "01 – Moorheilbad"
            type: object
            fields:
              - name: number
                type: string
              - name: body
                label: "Description"
                type: text
          - name: therme
            label: "02 – Therme & Spa"
            type: object
            fields:
              - name: number
                label: "Number (e.g. \"02\")"
                type: string
              - name: heading
                label: "Heading"
                type: string
              - name: body
                label: "Description"
                type: text
          - name: nature
            label: "03 – Allgäuer Natur"
            type: object
            fields:
              - name: number
                label: "Number (e.g. \"03\")"
                type: string
              - name: heading
                label: "Heading"
                type: string
              - name: body
                label: "Description"
                type: text

      - name: packages_section
        label: "Packages Section (Headings)"
        type: object
        fields:
          - name: caption
            label: "Category Label (e.g. \"Pakete & Angebote\")"
            type: string
          - name: heading
            label: "Section Heading"
            type: string
          - name: all_link_label
            label: "\"All Packages\" Button Text"
            type: string

      - name: rooms_section
        label: "Rooms Section (Headings)"
        type: object
        fields:
          - name: caption
            label: "Category Label"
            type: string
          - name: heading
            label: "Section Heading"
            type: string
          - name: body
            label: "Intro Text"
            type: text
          - name: all_link_label
            label: "\"All Rooms\" Button Text"
            type: string
          - name: featured_image
            label: "Featured Preview Image"
            type: image

      - name: therme_cta
        label: "Thermal Spa Section"
        type: object
        fields:
          - name: background_image
            label: "Background Image"
            type: image
          - name: caption
            label: "Category Label"
            type: string
          - name: heading
            label: "Section Heading"
            type: string
          - name: body
            label: "Description"
            type: text
          - name: stat_1_value
            label: "Stat 1 Value (e.g. \"1.500 m²\")"
            type: string
          - name: stat_1_label
            label: "Stat 1 Label (e.g. \"Water Surface\")"
            type: string
          - name: stat_2_value
            label: "Stat 2 Value (e.g. \"7\")"
            type: string
          - name: stat_2_label
            label: "Stat 2 Label (e.g. \"Saunas\")"
            type: string
          - name: stat_3_value
            label: "Stat 3 Value (e.g. \"34 °C\")"
            type: string
          - name: stat_3_label
            label: "Stat 3 Label (e.g. \"Water Temperature\")"
            type: string
          - name: cta_primary_label
            label: "Primary Button Text"
            type: string
          - name: cta_secondary_label
            label: "Secondary Button Text"
            type: string

      - name: voucher_strip
        label: "Gift Vouchers Section"
        type: object
        fields:
          - name: caption
            label: "Category Label"
            type: string
          - name: heading
            label: "Heading"
            type: string
          - name: subheading
            label: "Second Line (italic)"
            type: string

  # ── ROOMS OVERVIEW PAGE ──────────────────────────────────────────────────────
  - name: rooms_page
    label: "Rooms & Suites – Overview Page"
    path: src/content/pages/rooms-overview.json
    type: file
    fields:
      - name: seo_title
        label: "Page Title (Browser Tab)"
        type: string
      - name: seo_description
        label: "Page Description (Google)"
        type: text
      - name: hero_caption
        label: "Category Label above Heading"
        type: string
      - name: hero_heading
        label: "Page Heading"
        type: string
      - name: hero_intro
        label: "Intro Text"
        type: text
      - name: amenities_heading
        label: "Section Heading (Included Amenities)"
        type: string
      - name: amenities_subheading
        label: "Section Subheading"
        type: string
      - name: amenities
        label: "In-Room Amenities (Wi-Fi, Breakfast, Spa, etc.)"
        type: list
        fields:
          - name: label
            label: "Amenity Name"
            type: string
      - name: cta_heading
        label: "CTA Heading (\"Ready for your stay?\")"
        type: string
      - name: cta_body
        label: "CTA Description"
        type: text

  # ── ROOMS COLLECTION ─────────────────────────────────────────────────────────
  - name: rooms
    label: "Rooms & Suites"
    path: src/content/rooms
    type: collection
    format: yaml-frontmatter
    extension: md
    fields:
      - name: name
        label: "Room Name (e.g. \"Doppelzimmer\")"
        type: string
        required: true
      - name: tagline
        label: "Short Tagline (card & hero)"
        type: string
      - name: size
        label: "Room Size (e.g. \"from 28 m²\")"
        type: string
      - name: capacity
        label: "Occupancy (e.g. \"1–2 Guests\")"
        type: string
      - name: highlight
        label: "Show \"Popular\" Badge?"
        type: boolean
      - name: sort_order
        label: "Display Order in Listing (1 = first)"
        type: number
      - name: seo_title
        label: "Page Title (Browser Tab)"
        type: string
      - name: seo_description
        label: "Page Description (Google)"
        type: text
      - name: hero_image
        label: "Hero Image (detail page)"
        type: image
      - name: preview_image
        label: "Preview Image (room card on listing page)"
        type: image
      - name: gallery
        label: "Photo Gallery (detail page)"
        type: list
        fields:
          - name: image
            label: "Photo"
            type: image
          - name: caption
            label: "Caption"
            type: string
      - name: intro_heading
        label: "Description Section Heading (e.g. \"The Room\")"
        type: string
      - name: intro_subheading
        label: "Description Subheading (e.g. \"Relax together – comfort for two\")"
        type: string
      - name: specs
        label: "Room Data (right sidebar)"
        type: list
        fields:
          - name: label
            label: "Label (e.g. \"Size\")"
            type: string
          - name: value
            label: "Value (e.g. \"from 28 m²\")"
            type: string
      - name: feature_groups
        label: "Amenity Groups"
        type: list
        fields:
          - name: heading
            label: "Group Name (e.g. \"Comfort\")"
            type: string
          - name: items
            label: "Features"
            type: list

  # ── PACKAGES COLLECTION ──────────────────────────────────────────────────────
  - name: packages
    label: "Packages & Offers"
    path: src/content/packages
    type: collection
    format: yaml-frontmatter
    extension: md
    fields:
      - name: title
        label: "Package Name"
        type: string
        required: true
      - name: tag
        label: "Category / mega-menu column (use: Gesundheitskur | Wellness | Retreat)"
        type: string
      - name: nights
        label: "Duration (e.g. \"7–14 Nights\")"
        type: string
      - name: teaser
        label: "Short Description (homepage card)"
        type: text
      - name: image
        label: "Preview Image"
        type: image
      - name: image_alt
        label: "Image Description (Alt Text)"
        type: string
      - name: price_from
        label: "Starting Price in EUR (number only, e.g. 195)"
        type: number
      - name: price_label
        label: "Price Suffix (e.g. \"per person / night\")"
        type: string
      - name: booking_link
        label: "Booking Link"
        type: string
      - name: nav_order
        label: "Nav order in mega menu (lower = earlier within its column)"
        type: number
      - name: show_in_nav
        label: "Show in header Angebote mega menu?"
        type: boolean
      - name: includes
        label: "What's Included"
        type: list

