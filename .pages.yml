media:
  input: public/images
  output: /images

content:

  # ── HOMEPAGE ────────────────────────────────────────────────────────────────
  - name: homepage
    label: "Homepage"
    path: src/content/pages/homepage.json
    type: file
    fields:
      - name: seo_title
        label: "Page Title (Browser Tab)"
        type: string
      - name: seo_description
        label: "Page Description (Google)"
        type: text

      - name: hero
        label: "Hero Section"
        type: object
        fields:
          - name: image
            label: "Background Image"
            type: image
          - name: image_alt
            label: "Image Description (Alt Text)"
            type: string
          - name: caption
            label: "Location Label (e.g. \"Bad Wurzach · Allgäu\")"
            type: string
          - name: headline_line1
            label: "Headline Line 1"
            type: string
          - name: headline_line2
            label: "Headline Line 2 (italic, highlighted)"
            type: string
          - name: body
            label: "Intro Text"
            type: text
          - name: cta_primary_label
            label: "Primary Button Text"
            type: string
          - name: cta_primary_href
            label: "Primary Button Link"
            type: string
          - name: cta_secondary_label
            label: "Secondary Button Text"
            type: string
          - name: cta_secondary_href
            label: "Secondary Button Link"
            type: string

      # Nested objects only (no list/array) — some CMS builds mishandle list fields
      - name: pillars
        label: "Three Pillars (01 Moorheilbad, 02 Therme, 03 Nature)"
        type: object
        fields:
          - name: moorheilbad
            label: "01 – Moorheilbad"
            type: object
            fields:
              - name: number
                label: "Number (e.g. \"01\")"
                type: string
              - name: heading
                label: "Heading"
                type: string
              - name: body
                label: "Description"
                type: text
          - name: therme
            label: "02 – Therme & Spa"
            type: object
            fields:
              - name: number
                label: "Number (e.g. \"02\")"
                type: string
              - name: heading
                label: "Heading"
                type: string
              - name: body
                label: "Description"
                type: text
          - name: nature
            label: "03 – Allgäuer Natur"
            type: object
            fields:
              - name: number
                label: "Number (e.g. \"03\")"
                type: string
              - name: heading
                label: "Heading"
                type: string
              - name: body
                label: "Description"
                type: text

      - name: packages_section
        label: "Packages Section (Headings)"
        type: object
        fields:
          - name: caption
            label: "Category Label (e.g. \"Pakete & Angebote\")"
            type: string
          - name: heading
            label: "Section Heading"
            type: string
          - name: all_link_label
            label: "\"All Packages\" Button Text"
            type: string

      - name: rooms_section
        label: "Rooms Section (Headings)"
        type: object
        fields:
          - name: caption
            label: "Category Label"
            type: string
          - name: heading
            label: "Section Heading"
            type: string
          - name: body
            label: "Intro Text"
            type: text
          - name: all_link_label
            label: "\"All Rooms\" Button Text"
            type: string
          - name: featured_image
            label: "Featured Preview Image"
            type: image

      - name: therme_cta
        label: "Thermal Spa Section"
        type: object
        fields:
          - name: background_image
            label: "Background Image"
            type: image
          - name: caption
            label: "Category Label"
            type: string
          - name: heading
            label: "Section Heading"
            type: string
          - name: body
            label: "Description"
            type: text
          - name: stat_1_value
            label: "Stat 1 Value (e.g. \"1.500 m²\")"
            type: string
          - name: stat_1_label
            label: "Stat 1 Label (e.g. \"Water Surface\")"
            type: string
          - name: stat_2_value
            label: "Stat 2 Value (e.g. \"7\")"
            type: string
          - name: stat_2_label
            label: "Stat 2 Label (e.g. \"Saunas\")"
            type: string
          - name: stat_3_value
            label: "Stat 3 Value (e.g. \"34 °C\")"
            type: string
          - name: stat_3_label
            label: "Stat 3 Label (e.g. \"Water Temperature\")"
            type: string
          - name: cta_primary_label
            label: "Primary Button Text"
            type: string
          - name: cta_secondary_label
            label: "Secondary Button Text"
            type: string

      - name: voucher_strip
        label: "Gift Vouchers Section"
        type: object
        fields:
          - name: caption
            label: "Category Label"
            type: string
          - name: heading
            label: "Heading"
            type: string
          - name: subheading
            label: "Second Line (italic)"
            type: string

  # ── ROOMS OVERVIEW PAGE ──────────────────────────────────────────────────────
  - name: rooms_page
    label: "Rooms & Suites, Overview Page"
    path: src/content/pages/rooms-overview.json
    type: file
    fields:
      - name: seo_title
        label: "Page Title (Browser Tab)"
        type: string
      - name: seo_description
        label: "Page Description (Google)"
        type: text
      - name: hero_caption
        label: "Category Label above Heading"
        type: string
      - name: hero_heading
        label: "Page Heading"
        type: string
      - name: hero_intro
        label: "Intro Text"
        type: text
      - name: amenities_heading
        label: "Section Heading (Included Amenities)"
        type: string
      - name: amenities_subheading
        label: "Section Subheading"
        type: string
      # Fixed tiles (no list-of-objects) — Pages CMS turns object lists into "[object Object]" in the UI
      - name: amenities_tiles
        label: "Included amenities (8 tiles, grid order left→right, top→bottom)"
        type: object
        fields:
          - name: tile_1
            label: "Tile 1"
            type: object
            fields:
              - name: label
                label: "Amenity name"
                type: string
              - name: icon_key
                label: "Icon key (optional — for future icon set; leave blank for default)"
                type: string
          - name: tile_2
            label: "Tile 2"
            type: object
            fields:
              - name: label
                label: "Amenity name"
                type: string
              - name: icon_key
                label: "Icon key (optional)"
                type: string
          - name: tile_3
            label: "Tile 3"
            type: object
            fields:
              - name: label
                label: "Amenity name"
                type: string
              - name: icon_key
                label: "Icon key (optional)"
                type: string
          - name: tile_4
            label: "Tile 4"
            type: object
            fields:
              - name: label
                label: "Amenity name"
                type: string
              - name: icon_key
                label: "Icon key (optional)"
                type: string
          - name: tile_5
            label: "Tile 5"
            type: object
            fields:
              - name: label
                label: "Amenity name"
                type: string
              - name: icon_key
                label: "Icon key (optional)"
                type: string
          - name: tile_6
            label: "Tile 6"
            type: object
            fields:
              - name: label
                label: "Amenity name"
                type: string
              - name: icon_key
                label: "Icon key (optional)"
                type: string
          - name: tile_7
            label: "Tile 7"
            type: object
            fields:
              - name: label
                label: "Amenity name"
                type: string
              - name: icon_key
                label: "Icon key (optional)"
                type: string
          - name: tile_8
            label: "Tile 8"
            type: object
            fields:
              - name: label
                label: "Amenity name"
                type: string
              - name: icon_key
                label: "Icon key (optional)"
                type: string
      - name: cta_heading
        label: "CTA Heading (\"Ready for your stay?\")"
        type: string
      - name: cta_body
        label: "CTA Description"
        type: text

  # ── ROOMS COLLECTION ─────────────────────────────────────────────────────────
  - name: rooms
    label: "Rooms & Suites"
    path: src/content/rooms
    type: collection
    format: yaml-frontmatter
    extension: md
    fields:
      - name: name
        label: "Room Name (e.g. \"Doppelzimmer\")"
        type: string
        required: true
      - name: variants
        label: "Room categories (e.g. \"Comfort · Classic\")"
        type: string
      - name: tagline
        label: "Short Tagline (card & hero)"
        type: string
      - name: size
        label: "Room Size (e.g. \"from 28 m²\")"
        type: string
      - name: capacity
        label: "Occupancy (e.g. \"1–2 Guests\")"
        type: string
      - name: highlight
        label: "Show \"Popular\" Badge?"
        type: boolean
      - name: sort_order
        label: "Display Order in Listing (1 = first)"
        type: number
      - name: seo_title
        label: "Page Title (Browser Tab)"
        type: string
      - name: seo_description
        label: "Page Description (Google)"
        type: text
      - name: hero_image
        label: "Hero Image (detail page)"
        type: image
      - name: preview_image
        label: "Preview Image (room card on listing page)"
        type: image
      # Lists of objects break Pages CMS UI (`[object Object]`). Use fixed slide slots instead.
      - name: gallery_slots
        label: "Photo Gallery (detail page — up to 12 slides, leave unused slots empty)"
        type: object
        fields:
          - name: slide_1
            label: "Gallery slide 1"
            type: object
            fields:
              - name: image
                label: "Photo"
                type: image
              - name: caption
                label: "Caption"
                type: string
          - name: slide_2
            label: "Gallery slide 2"
            type: object
            fields:
              - name: image
                label: "Photo"
                type: image
              - name: caption
                label: "Caption"
                type: string
          - name: slide_3
            label: "Gallery slide 3"
            type: object
            fields:
              - name: image
                label: "Photo"
                type: image
              - name: caption
                label: "Caption"
                type: string
          - name: slide_4
            label: "Gallery slide 4"
            type: object
            fields:
              - name: image
                label: "Photo"
                type: image
              - name: caption
                label: "Caption"
                type: string
          - name: slide_5
            label: "Gallery slide 5"
            type: object
            fields:
              - name: image
                label: "Photo"
                type: image
              - name: caption
                label: "Caption"
                type: string
          - name: slide_6
            label: "Gallery slide 6"
            type: object
            fields:
              - name: image
                label: "Photo"
                type: image
              - name: caption
                label: "Caption"
                type: string
          - name: slide_7
            label: "Gallery slide 7"
            type: object
            fields:
              - name: image
                label: "Photo"
                type: image
              - name: caption
                label: "Caption"
                type: string
          - name: slide_8
            label: "Gallery slide 8"
            type: object
            fields:
              - name: image
                label: "Photo"
                type: image
              - name: caption
                label: "Caption"
                type: string
          - name: slide_9
            label: "Gallery slide 9"
            type: object
            fields:
              - name: image
                label: "Photo"
                type: image
              - name: caption
                label: "Caption"
                type: string
          - name: slide_10
            label: "Gallery slide 10"
            type: object
            fields:
              - name: image
                label: "Photo"
                type: image
              - name: caption
                label: "Caption"
                type: string
          - name: slide_11
            label: "Gallery slide 11"
            type: object
            fields:
              - name: image
                label: "Photo"
                type: image
              - name: caption
                label: "Caption"
                type: string
          - name: slide_12
            label: "Gallery slide 12"
            type: object
            fields:
              - name: image
                label: "Photo"
                type: image
              - name: caption
                label: "Caption"
                type: string
      - name: intro_heading
        label: "Description Section Heading (e.g. \"The Room\")"
        type: string
      - name: intro_subheading
        label: "Description Subheading (e.g. \"Relax together – comfort for two\")"
        type: string
      - name: specs_slots
        label: "Room Data (right sidebar — up to 10 rows)"
        type: object
        fields:
          - name: row_1
            label: "Spec row 1"
            type: object
            fields:
              - name: label
                label: "Label (e.g. \"Size\")"
                type: string
              - name: value
                label: "Value"
                type: string
          - name: row_2
            label: "Spec row 2"
            type: object
            fields:
              - name: label
                label: "Label"
                type: string
              - name: value
                label: "Value"
                type: string
          - name: row_3
            label: "Spec row 3"
            type: object
            fields:
              - name: label
                label: "Label"
                type: string
              - name: value
                label: "Value"
                type: string
          - name: row_4
            label: "Spec row 4"
            type: object
            fields:
              - name: label
                label: "Label"
                type: string
              - name: value
                label: "Value"
                type: string
          - name: row_5
            label: "Spec row 5"
            type: object
            fields:
              - name: label
                label: "Label"
                type: string
              - name: value
                label: "Value"
                type: string
          - name: row_6
            label: "Spec row 6"
            type: object
            fields:
              - name: label
                label: "Label"
                type: string
              - name: value
                label: "Value"
                type: string
          - name: row_7
            label: "Spec row 7"
            type: object
            fields:
              - name: label
                label: "Label"
                type: string
              - name: value
                label: "Value"
                type: string
          - name: row_8
            label: "Spec row 8"
            type: object
            fields:
              - name: label
                label: "Label"
                type: string
              - name: value
                label: "Value"
                type: string
          - name: row_9
            label: "Spec row 9"
            type: object
            fields:
              - name: label
                label: "Label"
                type: string
              - name: value
                label: "Value"
                type: string
          - name: row_10
            label: "Spec row 10"
            type: object
            fields:
              - name: label
                label: "Label"
                type: string
              - name: value
                label: "Value"
                type: string
      # One block per group — features are one bullet per line (no nested lists).
      - name: feature_groups_block
        label: "Amenity Groups (up to 4 sections)"
        type: object
        fields:
          - name: group_1_heading
            label: "Group 1 heading"
            type: string
          - name: group_1_features
            label: "Group 1 features (one per line)"
            type: text
          - name: group_2_heading
            label: "Group 2 heading"
            type: string
          - name: group_2_features
            label: "Group 2 features (one per line)"
            type: text
          - name: group_3_heading
            label: "Group 3 heading"
            type: string
          - name: group_3_features
            label: "Group 3 features (one per line)"
            type: text
          - name: group_4_heading
            label: "Group 4 heading"
            type: string
          - name: group_4_features
            label: "Group 4 features (one per line)"
            type: text

  # ── PACKAGES COLLECTION ──────────────────────────────────────────────────────
  - name: packages
    label: "Packages & Offers"
    path: src/content/packages
    type: collection
    format: yaml-frontmatter
    extension: md
    view:
      fields: [title, tag, nights, teaser, image, price_from, availability]
      primary: title
      sort: [title, tag, nav_order]
      default:
        sort: title
        order: asc
    fields:
      - name: title
        label: "Package Name"
        type: string
        required: true
      - name: tag
        label: "Category"
        type: select
        options:
          - "Heilung & Regeneration"
          - "Entschlackung & Entgiftung"
          - "Entschleunigung & Wellness"
          - "Saisonal & Specials"
      - name: nights
        label: "Duration (e.g. \"7–14 Nights\")"
        type: string
      - name: teaser
        label: "Short Description (homepage card)"
        type: text
      - name: image
        label: "Preview Image"
        type: image
      - name: image_alt
        label: "Image Description (Alt Text)"
        type: string
      - name: price_from
        label: "Starting Price in EUR (number only, e.g. 195)"
        type: number
      - name: price_label
        label: "Price Suffix (e.g. \"per person / night\")"
        type: string
      - name: booking_link
        label: "Booking Link (single option)"
        type: string
      - name: booking_options
        label: "Booking Options (multiple durations)"
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{label}"
        fields:
          - name: label
            label: "Duration Label (e.g. 7 Übernachtungen)"
            type: string
          - name: href
            label: "Booking URL"
            type: string
      - name: nav_order
        label: "Nav order in mega menu (lower = earlier within its column)"
        type: number
      - name: show_in_nav
        label: "Show in header Angebote mega menu?"
        type: boolean
      - name: includes
        label: "What's Included"
        type: string
        list: true
      - name: subtitle
        label: "Subtitle / Tagline (shown under the title)"
        type: string
      - name: inclusion_note
        label: "Note below the inclusions list (conditions, asterisks)"
        type: text
      - name: recommendations
        label: "Our Recommendation (Unsere Empfehlung, bullet list)"
        type: string
        list: true
      - name: availability
        label: "Dates / Availability (Termine)"
        type: text
      - name: availability_note
        label: "Availability note"
        type: text
      - name: pricing_tiers
        label: "Pricing Tiers (one row per duration)"
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{duration}"
        fields:
          - name: duration
            label: "Duration (e.g. 10 Übernachtungen)"
            type: string
          - name: price_from
            label: "From price in EUR (number only)"
            type: number
          - name: price_note
            label: "Price note (e.g. im Classic Doppelzimmer)"
            type: string
          - name: href
            label: "Booking URL"
            type: string
      - name: highlights
        label: "Feature Highlights (cards)"
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - name: title
            label: "Title"
            type: string
          - name: text
            label: "Text"
            type: text
      - name: program_intro
        label: "Program Intro (above the Punktekatalog / table)"
        type: text
      - name: points_catalog
        label: "Points Catalog (Punktekatalog)"
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{points}"
        fields:
          - name: points
            label: "Points label (e.g. 11 Punkte)"
            type: string
          - name: items
            label: "Treatments (separate with |)"
            type: text
      - name: program_columns
        label: "Program Table Columns (e.g. 10 Nächte)"
        type: string
        list: true
      - name: program_rows
        label: "Program Table Rows"
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{treatment}"
        fields:
          - name: treatment
            label: "Treatment (Leistung)"
            type: string
          - name: effect
            label: "Effect (Wirkungsweise)"
            type: text
          - name: values
            label: "Values per column (in column order)"
            type: string
            list: true
      - name: gallery
        label: "Image Gallery"
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{alt}"
        fields:
          - name: image
            label: "Photo"
            type: image
          - name: alt
            label: "Alt text"
            type: string
      - name: closing_heading
        label: "Closing Section Heading (e.g. Warum ins Moor?)"
        type: string
      - name: closing_body
        label: "Closing Section Text"
        type: text

  # ── NEWS / BLOG ───────────────────────────────────────────────────────────────
  - name: news_page
    label: "News & Blog, Overview"
    path: src/content/pages/news.json
    type: file
    fields:
      - { name: seo_title, label: "Page Title", type: string }
      - { name: seo_description, label: "Meta Description", type: text }
      - { name: hero_caption, label: "Hero Caption", type: string }
      - { name: hero_heading, label: "Hero Heading", type: string }
      - { name: hero_intro, label: "Hero Intro", type: text }

  - name: blog
    label: "News & Blog Posts"
    path: src/content/blog
    type: collection
    format: yaml-frontmatter
    extension: md
    fields:
      - name: title
        label: "Headline (on the page)"
        type: string
        required: true
      - name: seo_title
        label: "SEO title (browser tab & Google)"
        type: string
        description: "Optional. If empty, the headline is used with „, feelMOOR Blog“."
      - name: seo_description
        label: "SEO description (Google)"
        type: text
        description: "Optional. If empty, the teaser is used."
      - name: date
        label: "Date"
        type: string
        description: "Format YYYY-MM-DD (e.g. 2026-05-20). Use this field only, not a date picker."
      - { name: author, label: "Author", type: string }
      - { name: category, label: "Category", type: string }
      - { name: teaser, label: "Teaser (card on /news overview)", type: text }
      - name: image
        label: "Featured image"
        type: image
        description: "Hero on the article page and thumbnail on /news. Pick from Media or upload; saves under /images/blog."
      - { name: image_alt, label: "Featured image alt text", type: string }
      - name: body
        label: "Article content"
        type: rich-text
        description: "Text only (headings, links, lists). Images go in Featured image above, not in this editor."
        options:
          switcher: true
          media: false

  # ── GLOBAL SETTINGS ──────────────────────────────────────────────────────────
  - name: site_settings
    label: "Global Settings"
    path: src/content/settings/site.json
    type: file
    fields:
      - name: hotel_name
        label: "Hotel Name"
        type: string
      - name: tagline
        label: "Hotel Tagline"
        type: string
      - name: address_street
        label: "Street Address"
        type: string
      - name: address_zip_city
        label: "Postcode & City"
        type: string
      - name: address_region
        label: "State / Region"
        type: string
      - name: address_country
        label: "Country"
        type: string
      - name: phone_display
        label: "Phone Number (display, e.g. \"+49 7564 30-1000\")"
        type: string
      - name: phone_link
        label: "Phone Number (tel link, no spaces, e.g. \"+497564301000\")"
        type: string
      - name: email
        label: "Email Address"
        type: string
      - name: social_instagram
        label: "Instagram Link"
        type: string
      - name: social_facebook
        label: "Facebook Link"
        type: string
      - name: default_og_image
        label: "Default Social Preview Image (OG Image)"
        type: image
      - name: copyright_name
        label: "Copyright Text (e.g. \"feelMOOR GmbH · Das Gesundresort Bad Wurzach\")"
        type: string
      - name: header_nav_links
        label: "Header mega menu — extra links (optional; for pages not in collections)"
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{label}"
        fields:
          - name: mega_menu_id
            label: "Section — hotel | therme | gesundheit | angebote | allgaeu"
            type: string
          - name: column_heading
            label: "Column heading (must match exactly, e.g. Das Resort, Zimmer & Suiten)"
            type: string
          - name: label
            label: "Link text"
            type: string
          - name: href
            label: "URL path"
            type: string
          - name: sort_order
            label: "Order among manual links (lower first)"
            type: number
      - name: footer_columns
        label: "Footer Navigation (4 columns)"
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{heading}"
        fields:
          - name: heading
